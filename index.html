<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chance</title>
  <style>
    :root {
      color-scheme: light;
      --display-size: 280px;
      --face-size: 180px;
      --ink: #172026;
      --muted: #66747f;
      --paper: #eef7f4;
      --panel: #ffffff;
      --line: #d9dde0;
      --blue: #2357d6;
      --blue-dark: #173f9f;
      --green: #24705a;
      --red: #b34141;
      --yellow: #f4bd45;
      --shadow: 0 24px 70px rgba(23, 32, 38, 0.18);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 20% 12%, rgba(55, 147, 124, 0.18), transparent 30rem),
        linear-gradient(135deg, #f4fbf8 0%, var(--paper) 44%, #e8f0fb 100%);
    }

    main {
      width: min(760px, calc(100% - 32px));
      min-height: 100vh;
      margin: 0 auto;
      display: grid;
      align-items: center;
      padding: 48px 0;
    }

    .stage {
      display: grid;
      gap: 20px;
      justify-items: center;
      text-align: center;
    }

    .topbar {
      width: min(100%, 360px);
      display: grid;
      gap: 14px;
      justify-items: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 7vw, 4.5rem);
      line-height: 0.95;
      letter-spacing: 0;
      text-align: center;
    }

    .display-shell {
      position: relative;
      width: min(58vw, var(--display-size));
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      perspective: 900px;
    }

    .display-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      border: 0;
      padding: 0;
      border-radius: 22px;
      background: transparent;
      opacity: 0;
      pointer-events: none;
      cursor: pointer;
      transform: scale(0.96);
      transition: opacity 240ms ease, transform 240ms ease;
    }

    .display-layer.is-active {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
    }

    .display-layer:focus-visible {
      outline: 4px solid rgba(35, 87, 214, 0.22);
      outline-offset: 8px;
    }

    .display-layer:disabled {
      cursor: wait;
    }

    .dice {
      position: relative;
      width: var(--face-size);
      aspect-ratio: 1;
      transform-style: preserve-3d;
      transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg);
      will-change: transform;
    }

    .face {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 12px;
      padding: 28px;
      border: 2px solid rgba(23, 32, 38, 0.12);
      border-radius: 18px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.96), rgba(236, 242, 248, 0.94)),
        var(--panel);
      box-shadow: inset -14px -16px 30px rgba(23, 32, 38, 0.06);
      backface-visibility: hidden;
    }

    .pip {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 999px;
      background: var(--ink);
      box-shadow: inset -3px -4px 8px rgba(255, 255, 255, 0.15);
    }

    .front { transform: translateZ(90px); }
    .back { transform: rotateY(180deg) translateZ(90px); }
    .right { transform: rotateY(90deg) translateZ(90px); }
    .left { transform: rotateY(-90deg) translateZ(90px); }
    .top { transform: rotateX(90deg) translateZ(90px); }
    .bottom { transform: rotateX(-90deg) translateZ(90px); }

    .center { grid-area: 2 / 2; }
    .top-left { grid-area: 1 / 1; }
    .top-right { grid-area: 1 / 3; }
    .middle-left { grid-area: 2 / 1; }
    .middle-right { grid-area: 2 / 3; }
    .bottom-left { grid-area: 3 / 1; }
    .bottom-right { grid-area: 3 / 3; }

    .action-row {
      width: min(100%, 360px);
      display: grid;
      gap: 10px;
    }

    .shuffle-control-row {
      display: grid;
      grid-template-columns: 118px minmax(0, 1fr);
      align-items: start;
      gap: 10px;
    }

    button {
      min-height: 48px;
      border: 0;
      border-radius: var(--radius);
      padding: 0 18px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease, box-shadow 160ms ease;
    }

    .display-layer.is-active:hover {
      transform: scale(1.02);
    }

    .action-button:hover {
      transform: translateY(-1px);
    }

    .action-button:active {
      transform: translateY(0);
    }

    .action-button {
      width: 100%;
      color: var(--ink);
      border: 1px solid var(--line);
      background: #fff;
    }

    .action-button.is-active {
      color: #fff;
      border-color: var(--blue);
      background: var(--blue);
      box-shadow: 0 14px 28px rgba(35, 87, 214, 0.22);
    }

    .action-button:disabled {
      cursor: wait;
      opacity: 0.72;
    }

    .number-display {
      width: var(--face-size);
      aspect-ratio: 1;
      justify-self: center;
      display: grid;
      place-items: center;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.92), rgba(235, 241, 247, 0.9)),
        #fff;
      box-shadow: inset 0 -18px 40px rgba(23, 32, 38, 0.06);
    }

    .shuffle-number {
      width: 100%;
      padding: 0 12px;
      text-align: center;
      color: var(--ink);
      font-size: clamp(2.8rem, 9vw, 5.25rem);
      font-weight: 900;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      transform: translateY(0) scale(1);
      transition: transform 120ms ease, color 120ms ease;
    }

    .shuffle-number.changing {
      color: var(--red);
      transform: translateY(-3px) scale(1.04);
    }

    .range-controls {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      min-height: 48px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-2px);
      transition: opacity 180ms ease, transform 260ms ease;
    }

    .mode-shuffle .range-controls {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    label {
      display: grid;
      gap: 4px;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    input {
      width: 100%;
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 0 8px;
      color: var(--ink);
      background: #fff;
      font: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 140ms ease, box-shadow 140ms ease;
    }

    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(35, 87, 214, 0.14);
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        scroll-behavior: auto !important;
        transition-duration: 1ms !important;
      }
    }

    @media (max-width: 820px) {
      main {
        grid-template-columns: 1fr;
        gap: 28px;
        padding: 30px 0;
      }

      .dice {
        width: 150px;
      }

      :root {
        --display-size: 240px;
        --face-size: 150px;
      }

      .shuffle-control-row {
        grid-template-columns: 1fr;
      }

      .face {
        gap: 10px;
        padding: 24px;
      }

      .front { transform: translateZ(75px); }
      .back { transform: rotateY(180deg) translateZ(75px); }
      .right { transform: rotateY(90deg) translateZ(75px); }
      .left { transform: rotateY(-90deg) translateZ(75px); }
      .top { transform: rotateX(90deg) translateZ(75px); }
      .bottom { transform: rotateX(-90deg) translateZ(75px); }
    }
  </style>
</head>
<body>
  <main class="mode-dice" id="app">
    <section class="stage" aria-label="Decision dice">
      <div class="topbar">
        <h1>Simbas Würfel</h1>
        <button class="action-button is-active" id="diceButton" type="button">Dice</button>
      </div>

      <div class="display-shell" aria-live="polite">
        <button class="display-layer is-active" id="diceRollButton" type="button" aria-label="Roll dice">
          <div class="dice" id="dice" aria-hidden="true">
            <div class="face front">
              <span class="pip center"></span>
            </div>
            <div class="face right">
              <span class="pip top-left"></span>
              <span class="pip bottom-right"></span>
            </div>
            <div class="face top">
              <span class="pip top-left"></span>
              <span class="pip center"></span>
              <span class="pip bottom-right"></span>
            </div>
            <div class="face bottom">
              <span class="pip top-left"></span>
              <span class="pip top-right"></span>
              <span class="pip bottom-left"></span>
              <span class="pip bottom-right"></span>
            </div>
            <div class="face left">
              <span class="pip top-left"></span>
              <span class="pip top-right"></span>
              <span class="pip center"></span>
              <span class="pip bottom-left"></span>
              <span class="pip bottom-right"></span>
            </div>
            <div class="face back">
              <span class="pip top-left"></span>
              <span class="pip top-right"></span>
              <span class="pip middle-left"></span>
              <span class="pip middle-right"></span>
              <span class="pip bottom-left"></span>
              <span class="pip bottom-right"></span>
            </div>
          </div>
        </button>

        <button class="display-layer" id="shuffleRollButton" type="button" aria-label="Shuffle number">
          <div class="number-display">
            <div class="shuffle-number" id="shuffleNumber">1</div>
          </div>
        </button>
      </div>

      <div class="action-row">
        <div class="shuffle-control-row">
          <button class="action-button" id="shuffleButton" type="button">Shuffle</button>
          <div class="range-controls" id="rangeControls" aria-label="Shuffle number range">
            <label>Min<input id="rangeMin" type="number" step="1" min="0" max="1000" value="1"></label>
            <label>Max<input id="rangeMax" type="number" step="1" min="0" max="1000" value="6"></label>
          </div>
        </div>
      </div>

    </section>
  </main>

  <script>
    const app = document.getElementById("app");
    const dice = document.getElementById("dice");
    const diceRollButton = document.getElementById("diceRollButton");
    const shuffleRollButton = document.getElementById("shuffleRollButton");
    const diceButton = document.getElementById("diceButton");
    const shuffleButton = document.getElementById("shuffleButton");
    const rangeMin = document.getElementById("rangeMin");
    const rangeMax = document.getElementById("rangeMax");
    const shuffleNumber = document.getElementById("shuffleNumber");
    const RANGE_LIMIT = 1000;

    const faceAngles = [
      { x: 0, y: 0, z: 0 },
      { x: 0, y: -90, z: 0 },
      { x: -90, y: 0, z: 0 },
      { x: 90, y: 0, z: 0 },
      { x: 0, y: 90, z: 0 },
      { x: 0, y: 180, z: 0 }
    ];

    let isRolling = false;
    let isShuffling = false;
    let currentRotation = { x: 0, y: 0, z: 0 };

    function setMode(mode) {
      const isDice = mode === "dice";
      app.classList.toggle("mode-dice", isDice);
      app.classList.toggle("mode-shuffle", !isDice);
      diceRollButton.classList.toggle("is-active", isDice);
      shuffleRollButton.classList.toggle("is-active", !isDice);
      diceButton.classList.toggle("is-active", isDice);
      shuffleButton.classList.toggle("is-active", !isDice);
      rangeMin.disabled = isDice;
      rangeMax.disabled = isDice;
    }

    function randomInt(min, max) {
      const range = max - min + 1;
      const maxUnbiasedValue = Math.floor(0x100000000 / range) * range;
      const randomBuffer = new Uint32Array(1);

      do {
        crypto.getRandomValues(randomBuffer);
      } while (randomBuffer[0] >= maxUnbiasedValue);

      return min + (randomBuffer[0] % range);
    }

    function clampRangeValue(value) {
      if (!Number.isFinite(value)) return 0;
      return Math.max(0, Math.min(RANGE_LIMIT, value));
    }

    function easeOutCubic(progress) {
      return 1 - Math.pow(1 - progress, 3);
    }

    function easeOutQuart(progress) {
      return 1 - Math.pow(1 - progress, 4);
    }

    function setDiceRotation(rotation) {
      dice.style.transform = `rotateX(${rotation.x}deg) rotateY(${rotation.y}deg) rotateZ(${rotation.z}deg)`;
    }

    function animateDiceTo(targetFace) {
      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const base = faceAngles[targetFace];
      const turns = reduceMotion ? 0 : 4;
      const wobble = reduceMotion ? 0 : 15;
      const start = { ...currentRotation };
      const end = {
        x: base.x + turns * 360,
        y: base.y + (turns + 1) * 360,
        z: base.z
      };
      const duration = reduceMotion ? 1 : 1180;

      return new Promise((resolve) => {
        const startTime = performance.now();

        function tick(now) {
          const rawProgress = Math.min((now - startTime) / duration, 1);
          const eased = easeOutQuart(rawProgress);
          const wobbleAmount = Math.sin(rawProgress * Math.PI * 9) * wobble * Math.pow(1 - rawProgress, 1.5);
          const next = {
            x: start.x + (end.x - start.x) * eased + wobbleAmount,
            y: start.y + (end.y - start.y) * eased - wobbleAmount * 0.65,
            z: start.z + (end.z - start.z) * eased + wobbleAmount * 0.35
          };

          setDiceRotation(next);

          if (rawProgress < 1) {
            requestAnimationFrame(tick);
          } else {
            currentRotation = { ...base };
            setDiceRotation(currentRotation);
            resolve();
          }
        }

        requestAnimationFrame(tick);
      });
    }

    async function rollDice() {
      if (isRolling) return;

      setMode("dice");
      isRolling = true;
      diceRollButton.disabled = true;
      shuffleRollButton.disabled = true;
      diceButton.disabled = true;
      shuffleButton.disabled = true;

      const selectedFace = randomInt(0, 5);
      await animateDiceTo(selectedFace);
      isRolling = false;
      diceRollButton.disabled = false;
      shuffleRollButton.disabled = false;
      diceButton.disabled = false;
      shuffleButton.disabled = false;
    }

    function getRange() {
      const first = clampRangeValue(Number.parseInt(rangeMin.value, 10));
      const second = clampRangeValue(Number.parseInt(rangeMax.value, 10));
      rangeMin.value = String(first);
      rangeMax.value = String(second);
      const min = Math.min(first, second);
      const max = Math.max(first, second);
      return { min, max };
    }

    function fitShuffleNumber(value, min, max) {
      const longest = Math.max(String(value).length, String(min).length, String(max).length);
      const size = Math.max(2.4, Math.min(5.25, 7.2 / longest));
      shuffleNumber.style.fontSize = `${size}rem`;
    }

    function animateNumberShuffle(finalNumber, min, max) {
      const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const duration = reduceMotion ? 1 : 1450;
      let lastStep = 0;
      let displayedFinal = false;

      return new Promise((resolve) => {
        const startTime = performance.now();

        function tick(now) {
          const progress = Math.min((now - startTime) / duration, 1);
          const interval = 28 + easeOutCubic(progress) * 180;

          if (progress === 1 && !displayedFinal) {
            fitShuffleNumber(finalNumber, min, max);
            shuffleNumber.textContent = String(finalNumber);
            shuffleNumber.classList.remove("changing");
            displayedFinal = true;
          } else if (now - lastStep >= interval && progress < 1) {
            const nextNumber = randomInt(min, max);
            fitShuffleNumber(nextNumber, min, max);
            shuffleNumber.textContent = String(nextNumber);
            shuffleNumber.classList.add("changing");
            window.setTimeout(() => shuffleNumber.classList.remove("changing"), 90);
            lastStep = now;
          }

          if (progress < 1) {
            requestAnimationFrame(tick);
          } else {
            resolve();
          }
        }

        requestAnimationFrame(tick);
      });
    }

    async function shuffleRange() {
      if (isShuffling) return;

      const { min, max } = getRange();
      const selected = randomInt(min, max);
      setMode("shuffle");
      isShuffling = true;
      diceRollButton.disabled = true;
      shuffleRollButton.disabled = true;
      diceButton.disabled = true;
      shuffleButton.disabled = true;

      await animateNumberShuffle(selected, min, max);
      isShuffling = false;
      diceRollButton.disabled = false;
      shuffleRollButton.disabled = false;
      diceButton.disabled = false;
      shuffleButton.disabled = false;
    }

    diceButton.addEventListener("click", () => setMode("dice"));
    shuffleButton.addEventListener("click", () => setMode("shuffle"));
    diceRollButton.addEventListener("click", rollDice);
    shuffleRollButton.addEventListener("click", shuffleRange);
    setMode("dice");

    window.addEventListener("keydown", (event) => {
      if (event.code === "Space" && document.activeElement.tagName !== "INPUT") {
        event.preventDefault();
        if (app.classList.contains("mode-shuffle")) {
          shuffleRange();
        } else {
          rollDice();
        }
      }
    });
  </script>
</body>
</html>
